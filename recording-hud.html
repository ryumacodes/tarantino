<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no" />
    <title>Recording HUD</title>
    <script type="module">
        // Import Tauri API properly
        import { invoke } from '@tauri-apps/api/core';
        import { listen } from '@tauri-apps/api/event';
        
        // Make invoke available globally
        window.tauriInvoke = invoke;
        window.tauriListen = listen;
        console.log('Tauri API loaded successfully');
    </script>
    <style>
        html, body { 
            margin: 0; 
            width: 100%; 
            height: 100%; 
            background: transparent;
            overflow: hidden;
            font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, 'SF Mono', Monaco, 'Cascadia Code', 'Roboto Mono', Courier, monospace;
        }

        #pill {
            /* native drag region */
            -webkit-app-region: drag;
            user-select: none;

            position: absolute; 
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: calc(100% - 8px); 
            height: calc(100% - 8px);
            max-width: 172px;
            max-height: 46px;
            display: flex; 
            align-items: center; 
            justify-content: center; 
            gap: 12px;
            padding: 0 16px;
            border-radius: 9999px;

            /* NO blur or glow */
            background: rgba(18, 18, 18, 0.95);
            border: 1px solid rgba(255, 255, 255, 0.08);
            box-shadow: none;               /* kill halo */
            backdrop-filter: none;          /* kill blur */
        }

        #time { 
            font: 600 16px/1 ui-monospace, SFMono-Regular, Menlo, Consolas, monospace; 
            color: #fff; 
            letter-spacing: .02em; 
        }

        #stop {
            -webkit-app-region: no-drag;    /* exclude from drag */
            width: 40px; 
            height: 40px; 
            border-radius: 9999px; 
            border: none; 
            cursor: pointer;
            background: #ff4747;
            position: relative;
        }
        
        #stop.clicked {
            background: #00ff00 !important;
            transform: scale(0.9);
        }
        
        #stop:hover { 
            background: #ff2a2a; 
        }

    </style>
</head>
<body style="background:transparent">
    <div id="pill" data-tauri-drag-region>
        <span id="time">00:00:00</span>
        <button id="stop" aria-label="Stop">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color: white;">
                <rect width="18" height="18" x="3" y="3" rx="2" ry="2"/>
            </svg>
        </button>
    </div>
    
    <!-- Debug info overlay -->
    <div id="debug" style="position: absolute; top: 70px; left: 10px; background: rgba(0,0,0,0.8); color: white; padding: 5px; font-size: 10px; border-radius: 3px; display: none; max-width: 200px; word-wrap: break-word;"></div>

    <script>
        console.log('=== HUD SCRIPT LOADING ===');
        console.log('Window object:', window);
        console.log('Document ready state:', document.readyState);
        
        let startTime = null;
        let timerInterval = null;

        const timeElement = document.getElementById('time');
        const stopButton = document.getElementById('stop');
        const debugElement = document.getElementById('debug');
        
        // Function to show debug info visually
        function showDebug(message) {
            console.log(message);
            // Show debug message in the timer area temporarily
            if (timeElement) {
                const originalText = timeElement.textContent;
                timeElement.textContent = message;
                timeElement.style.fontSize = '12px';
                timeElement.style.color = '#00ff00';
                
                // Restore original after 3 seconds
                setTimeout(() => {
                    timeElement.style.fontSize = '16px';
                    timeElement.style.color = '#fff';
                    timeElement.textContent = originalText;
                }, 3000);
            }
        }
        
        console.log('Time element:', timeElement);
        console.log('Stop button element:', stopButton);
        
        if (!stopButton) {
            console.error('Stop button not found!');
        }

        // Initialize HUD
        function initializeHUD() {
            console.log('Recording HUD initialized');
            // Start timer immediately
            startTime = Date.now();
            startTimer();
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            
            timerInterval = setInterval(() => {
                if (!startTime) return;
                
                const now = Date.now();
                const elapsed = now - startTime;
                const seconds = Math.floor(elapsed / 1000);
                
                const hours = Math.floor(seconds / 3600);
                const minutes = Math.floor((seconds % 3600) / 60);
                const secs = seconds % 60;
                
                const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
                timeElement.textContent = timeStr;
                
            }, 1000);
            
            // Initial update
            updateTime();
        }
        
        function updateTime() {
            if (!startTime) return;
            
            const now = Date.now();
            const elapsed = now - startTime;
            const seconds = Math.floor(elapsed / 1000);
            
            const hours = Math.floor(seconds / 3600);
            const minutes = Math.floor((seconds % 3600) / 60);
            const secs = seconds % 60;
            
            const timeStr = `${hours.toString().padStart(2, '0')}:${minutes.toString().padStart(2, '0')}:${secs.toString().padStart(2, '0')}`;
            timeElement.textContent = timeStr;
        }

        function stopTimer() {
            if (timerInterval) {
                clearInterval(timerInterval);
                timerInterval = null;
            }
        }

        // Stop button functionality
        if (stopButton) {
            stopButton.addEventListener('click', async (e) => {
                e.preventDefault();
                e.stopPropagation();
                
                // Visual feedback - turn button green when clicked
                stopButton.classList.add('clicked');
                showDebug('Stop button clicked!');
                
                try {
                    stopTimer();
                    showDebug('Timer stopped');
                    
                    if (window.tauriInvoke) {
                        showDebug('Tauri invoke available!');
                        try {
                            showDebug('Invoking hud_stop...');
                            const result = await window.tauriInvoke('hud_stop');
                            showDebug('Recording stopped successfully!');
                            
                            // HUD will be automatically closed by the backend when editor opens
                        } catch (invokeError) {
                            showDebug('Invoke error: ' + invokeError.message);
                            console.error('Detailed error:', invokeError);
                        }
                    } else {
                        showDebug('ERROR: Tauri invoke not available');
                        // Fallback: try using a simple HTTP request to trigger stop
                        showDebug('Trying HTTP fallback...');
                        try {
                            fetch('/api/stop-recording', { method: 'POST' });
                            showDebug('HTTP request sent');
                        } catch (fetchError) {
                            showDebug('HTTP also failed - completely offline');
                        }
                    }
                } catch (error) {
                    showDebug('ERROR: ' + error.message);
                }
            });
        } else {
            showDebug('ERROR: Stop button not found');
        }

        // JavaScript fallback for dragging
        async function setupDragging() {
            const pill = document.getElementById('pill');
            if (!pill) return;
            
            pill.addEventListener('pointerdown', async (e) => {
                // Don't drag if clicking the stop button
                if (e.target.closest('#stop')) return;
                
                e.preventDefault();
                
                // Use Tauri's drag API as fallback
                if (window.tauriInvoke) {
                    try {
                        // Try to use Tauri's window API for dragging
                        await window.tauriInvoke('start_window_drag');
                        console.log('Started dragging via Tauri command');
                    } catch (error) {
                        console.error('Failed to start dragging:', error);
                    }
                }
            });
        }

        // Initialize when page loads
        document.addEventListener('DOMContentLoaded', () => {
            initializeHUD();
            setupDragging();
        });

        // Listen for Tauri events
        if (window.tauriListen) {
            window.tauriListen('recording:started', (event) => {
                console.log('Recording started event:', event.payload);
                if (event.payload.started_at_ms) {
                    startTime = event.payload.started_at_ms;
                    updateTime();
                }
            });
        }

        console.log('Recording HUD loaded');
    </script>
</body>
</html>
